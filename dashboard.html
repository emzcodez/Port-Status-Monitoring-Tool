<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SDN Port Monitor</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=DM+Sans:wght@400;500;600&display=swap');

  :root {
    --bg:       #0d1117;
    --surface:  #161b22;
    --border:   #30363d;
    --text:     #e6edf3;
    --muted:    #7d8590;
    --up:       #3fb950;
    --up-bg:    #12261e;
    --down:     #f85149;
    --down-bg:  #2d0f0e;
    --warn:     #e3b341;
    --warn-bg:  #271d0f;
    --info:     #58a6ff;
    --info-bg:  #0d1f33;
    --accent:   #1f6feb;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 24px;
  }

  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 28px;
    border-bottom: 1px solid var(--border);
    padding-bottom: 16px;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .logo-icon {
    width: 36px; height: 36px;
    background: var(--accent);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
  }

  h1 { font-size: 18px; font-weight: 600; }
  .subtitle { font-size: 13px; color: var(--muted); margin-top: 2px; }

  .header-right {
    display: flex; align-items: center; gap: 12px;
  }

  #connection-badge {
    display: flex; align-items: center; gap: 6px;
    font-size: 12px; font-family: 'JetBrains Mono', monospace;
    padding: 5px 10px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--muted);
    transition: all 0.3s;
  }

  #connection-badge.connected { border-color: var(--up); color: var(--up); background: var(--up-bg); }
  #connection-badge.error     { border-color: var(--down); color: var(--down); background: var(--down-bg); }

  .dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: currentColor;
  }

  .dot.pulse {
    animation: pulse 1.4s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50%       { opacity: 0.5; transform: scale(0.75); }
  }

  .refresh-btn {
    font-size: 12px;
    padding: 5px 12px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text);
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    transition: background 0.15s, border-color 0.15s;
  }

  .refresh-btn:hover { background: var(--border); }

  #last-updated {
    font-size: 11px; color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
  }

  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 16px;
    margin-bottom: 24px;
  }

  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px 20px;
  }

  .stat-label { font-size: 12px; color: var(--muted); margin-bottom: 6px; }
  .stat-val   { font-size: 28px; font-weight: 600; font-family: 'JetBrains Mono', monospace; }
  .stat-val.up   { color: var(--up); }
  .stat-val.down { color: var(--down); }
  .stat-val.info { color: var(--info); }

  .section { margin-bottom: 24px; }
  .section-title {
    font-size: 13px; font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 12px;
  }

  .port-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 10px;
  }

  .port-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px 16px;
    position: relative;
    transition: border-color 0.2s;
  }

  .port-card.up   { border-left: 3px solid var(--up); }
  .port-card.down { border-left: 3px solid var(--down); }
  .port-card.blocked { border-left: 3px solid var(--warn); }

  .port-header {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 8px;
  }

  .port-name {
    font-size: 14px; font-weight: 600;
    font-family: 'JetBrains Mono', monospace;
  }

  .badge {
    font-size: 11px; font-weight: 600;
    padding: 2px 8px; border-radius: 4px;
    font-family: 'JetBrains Mono', monospace;
    text-transform: uppercase;
  }

  .badge.up   { background: var(--up-bg);   color: var(--up);   border: 1px solid var(--up); }
  .badge.down { background: var(--down-bg); color: var(--down); border: 1px solid var(--down); }
  .badge.blocked { background: var(--warn-bg); color: var(--warn); border: 1px solid var(--warn); }

  .port-meta { font-size: 12px; color: var(--muted); }
  .port-meta span { display: block; margin-top: 2px; }

  .event-log {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
  }

  .event-log-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    background: #1a2030;
  }

  .event-log-title { font-size: 13px; font-weight: 600; }

  .event-count {
    font-size: 11px; background: var(--accent);
    color: white; padding: 2px 8px; border-radius: 10px;
  }

  .event-row {
    display: grid;
    grid-template-columns: 160px 130px 80px 120px 1fr;
    align-items: center;
    padding: 10px 16px;
    border-bottom: 1px solid var(--border);
    font-size: 12px;
    font-family: 'JetBrains Mono', monospace;
    transition: background 0.1s;
  }

  .event-row:hover { background: #1a2030; }
  .event-row:last-child { border-bottom: none; }

  .event-row.up   { border-left: 2px solid var(--up); }
  .event-row.down { border-left: 2px solid var(--down); }
  .event-row.add  { border-left: 2px solid var(--info); }
  .event-row.mod  { border-left: 2px solid var(--warn); }

  .event-time  { color: var(--muted); }
  .event-dpid  { color: var(--info); overflow: hidden; text-overflow: ellipsis; }
  .event-port  { color: var(--text); }
  .event-reason { font-size: 11px; }
  .event-state { }

  .col-up   { color: var(--up); }
  .col-down { color: var(--down); }
  .col-mod  { color: var(--warn); }
  .col-add  { color: var(--info); }

  .mac-table {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
  }

  .mac-row {
    display: grid;
    grid-template-columns: 180px 100px 1fr;
    padding: 9px 16px;
    font-size: 12px;
    font-family: 'JetBrains Mono', monospace;
    border-bottom: 1px solid var(--border);
  }

  .mac-row:last-child { border-bottom: none; }
  .mac-row.header { color: var(--muted); font-size: 11px; background: #1a2030; }
  .mac-mac   { color: var(--text); }
  .mac-port  { color: var(--info); }
  .mac-dpid  { color: var(--muted); }

  .empty-state {
    padding: 32px; text-align: center;
    color: var(--muted); font-size: 13px;
  }

  .no-data {
    font-size: 12px; color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
    padding: 20px 16px;
    text-align: center;
  }

  .two-col {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
  }

  @media (max-width: 900px) {
    .grid { grid-template-columns: 1fr 1fr; }
    .two-col { grid-template-columns: 1fr; }
    .event-row { grid-template-columns: 1fr 1fr; gap: 4px; }
  }

  .new-event-flash {
    animation: flashRow 1s ease-out;
  }

  @keyframes flashRow {
    0%   { background: #1f3a1f; }
    100% { background: transparent; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">&#9741;</div>
    <div>
      <h1>SDN Port Monitor</h1>
      <div class="subtitle">Ryu OpenFlow 1.3 · L2 Learning Switch</div>
    </div>
  </div>
  <div class="header-right">
    <span id="last-updated">–</span>
    <button class="refresh-btn" onclick="fetchStatus()">↻ Refresh</button>
    <div id="connection-badge">
      <div class="dot"></div>
      <span id="conn-label">Connecting…</span>
    </div>
  </div>
</header>

<!-- Summary stats -->
<div class="grid">
  <div class="stat-card">
    <div class="stat-label">Ports UP</div>
    <div class="stat-val up" id="stat-up">–</div>
  </div>
  <div class="stat-card">
    <div class="stat-label">Ports DOWN</div>
    <div class="stat-val down" id="stat-down">–</div>
  </div>
  <div class="stat-card">
    <div class="stat-label">Events logged</div>
    <div class="stat-val info" id="stat-events">–</div>
  </div>
</div>

<!-- Port cards -->
<div class="section">
  <div class="section-title">Live Port States</div>
  <div class="port-grid" id="port-grid">
    <div class="empty-state">Waiting for data from controller…</div>
  </div>
</div>

<div class="two-col">
  <!-- Event log -->
  <div class="section">
    <div class="section-title">Port Event Log</div>
    <div class="event-log">
      <div class="event-log-header">
        <span class="event-log-title">Recent port events</span>
        <span class="event-count" id="event-count">0</span>
      </div>
      <div id="event-list">
        <div class="no-data">No events yet</div>
      </div>
    </div>
  </div>

  <!-- MAC table -->
  <div class="section">
    <div class="section-title">MAC Learning Table</div>
    <div class="mac-table">
      <div class="mac-row header">
        <span>MAC Address</span><span>Port</span><span>Switch DPID</span>
      </div>
      <div id="mac-list">
        <div class="no-data">No learned MACs yet</div>
      </div>
    </div>
  </div>
</div>

<script>
const API = 'http://localhost:8080/status';
let prevEventCount = 0;

async function fetchStatus() {
  const badge = document.getElementById('connection-badge');
  const label = document.getElementById('conn-label');
  try {
    const res = await fetch(API);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    badge.className = 'connected';
    badge.querySelector('.dot').className = 'dot';
    label.textContent = 'Connected';
    document.getElementById('last-updated').textContent =
      'Updated ' + new Date().toLocaleTimeString();
    renderAll(data);
  } catch(e) {
    badge.className = 'error';
    badge.querySelector('.dot').className = 'dot pulse';
    label.textContent = 'Offline – start controller';
  }
}

function renderAll(data) {
  renderPorts(data.port_states || {});
  renderEvents(data.recent_events || []);
  renderMac(data.mac_table || {});
}

function renderPorts(portStates) {
  const grid = document.getElementById('port-grid');
  const allCards = [];
  let upCount = 0, downCount = 0;

  for (const [dpid, ports] of Object.entries(portStates)) {
    for (const [portNo, info] of Object.entries(ports)) {
      const isDown    = info.state === 'DOWN';
      const isBlocked = parseInt(portNo) === 3;
      const cls = isDown ? 'down' : (isBlocked ? 'blocked' : 'up');
      if (isDown) downCount++; else upCount++;

      allCards.push(`
        <div class="port-card ${cls}">
          <div class="port-header">
            <span class="port-name">${info.name || 'port-' + portNo}</span>
            <span class="badge ${cls}">${isBlocked && !isDown ? 'ACL BLOCK' : info.state}</span>
          </div>
          <div class="port-meta">
            <span>Port no: ${portNo}</span>
            <span>Switch: ${dpid}</span>
            <span>Last change: ${info.last_change || '–'}</span>
            <span>Reason: ${info.reason || '–'}</span>
          </div>
        </div>
      `);
    }
  }

  document.getElementById('stat-up').textContent   = upCount;
  document.getElementById('stat-down').textContent = downCount;

  grid.innerHTML = allCards.length ? allCards.join('') :
    '<div class="empty-state">No ports detected yet. Is Mininet running?</div>';
}

function renderEvents(events) {
  document.getElementById('stat-events').textContent = events.length;
  document.getElementById('event-count').textContent = events.length;

  const list = document.getElementById('event-list');
  if (!events.length) {
    list.innerHTML = '<div class="no-data">No port events recorded yet</div>';
    return;
  }

  const isNew = events.length > prevEventCount;
  prevEventCount = events.length;

  list.innerHTML = events.slice(0, 20).map((e, i) => {
    const cls = e.state === 'UP' ? 'up' :
                e.state === 'DOWN' ? 'down' :
                e.reason.includes('ADD') ? 'add' : 'mod';
    const stateClass = e.state === 'UP' ? 'col-up' :
                       e.state === 'DOWN' ? 'col-down' : 'col-mod';
    const flash = (i === 0 && isNew) ? 'new-event-flash' : '';
    return `
      <div class="event-row ${cls} ${flash}">
        <span class="event-time">${e.timestamp}</span>
        <span class="event-dpid">${e.dpid}</span>
        <span class="event-port">port-${e.port_no}</span>
        <span class="event-reason ${cls === 'add' ? 'col-add' : cls === 'mod' ? 'col-mod' : stateClass}">${e.reason}</span>
        <span class="event-state ${stateClass}">${e.state}</span>
      </div>
    `;
  }).join('');
}

function renderMac(macTable) {
  const list = document.getElementById('mac-list');
  const rows = [];
  for (const [dpid, macs] of Object.entries(macTable)) {
    for (const [mac, port] of Object.entries(macs)) {
      rows.push(`
        <div class="mac-row">
          <span class="mac-mac">${mac}</span>
          <span class="mac-port">${port}</span>
          <span class="mac-dpid">${dpid}</span>
        </div>
      `);
    }
  }
  list.innerHTML = rows.length ? rows.join('') :
    '<div class="no-data">No MACs learned yet</div>';
}

// Auto-refresh every 3 seconds
fetchStatus();
setInterval(fetchStatus, 3000);
</script>
</body>
</html>
